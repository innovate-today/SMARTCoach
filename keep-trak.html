<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Keep Trak</title>
<style>
:root{--blue:#2b4fcc;--line:#d6dfec;--muted:#52627a;--bg:#eef3f9;--panel:#fff;--ink:#111827;--good:#08783c;--bad:#b91c1c}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}
body.embedded .page{max-width:none;padding:16px 18px 28px}
button,.linkbtn{border:0;border-radius:8px;background:var(--blue);color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:8px 11px;cursor:pointer;text-decoration:none}
button.secondary,.linkbtn.secondary{background:#dde3ed;color:#172033}
button.ghost,.linkbtn.ghost{background:#eef2f7;color:#172033}
button.danger{background:#fee2e2;color:#b91c1c}
button:disabled{opacity:.55;cursor:not-allowed}
.page{max-width:1440px;margin:0 auto;padding:18px 26px 34px}
.top{position:sticky;top:10px;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px;box-shadow:0 8px 22px rgba(15,23,42,.08)}
.brand{display:flex;align-items:center;gap:14px}
.mark{width:62px;height:62px;border-radius:10px;display:grid;place-items:center;overflow:hidden}
.mark img{width:58px;height:58px;object-fit:contain}
h1{font-size:26px;line-height:1.05;margin:0 0 3px}
.sub{color:#435574;font-size:14px}
.updated{display:inline-flex;margin-top:8px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:#f8fbff;font-size:13px;font-weight:800;color:#1f2a44}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden}
.panelhead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.panelhead h2{font-size:18px;margin:0}
.panelbody{padding:14px 16px}
.toolbar{display:grid;grid-template-columns:auto auto auto 1fr auto;gap:10px;align-items:end}
label{display:grid;gap:5px;font-size:12px;font-weight:900;text-transform:uppercase;color:#435066;letter-spacing:.03em}
input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:#111827;font:14px inherit;padding:10px 12px}
textarea{min-height:132px;resize:vertical;line-height:1.45}
.formgrid{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
.labelrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.status{font-size:13px;font-weight:900;color:var(--muted)}
.layout{display:grid;grid-template-columns:360px 1fr;gap:14px}
.daylist{display:grid;gap:8px}
.note{border:1px solid var(--line);border-radius:8px;background:#fbfdff;overflow:hidden}
.note.completed{background:#f1f5f9;color:#64748b}
.notehead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:11px 12px;border-bottom:1px solid var(--line);background:#fff}
.note.completed .notehead{background:#e2e8f0}
.notetitle{font-weight:950;font-size:15px}
.notemeta{color:var(--muted);font-size:12px;margin-top:2px}
.notebody{white-space:pre-wrap;line-height:1.45;padding:12px;font-size:14px}
.noteactions{display:flex;gap:8px;flex-wrap:wrap;padding:0 12px 12px}
.empty{padding:22px;text-align:center;color:var(--muted)}
.cleanup{border-color:#f4c56f;background:#fff8df}
.cleanup .panelhead{background:#fff1bd;border-bottom-color:#f4c56f}
.cleanup-list{display:grid;gap:8px;margin:10px 0}
.cleanup-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;border:1px solid #f4c56f;border-radius:8px;background:#fff;padding:10px}
.cleanup-row input{width:18px;height:18px;margin-top:2px;accent-color:var(--blue)}
.cleanup-row b{display:block;font-size:14px}
.cleanup-row span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.cleanup-actions{display:flex;gap:8px;flex-wrap:wrap}
.today-badge{display:inline-flex;align-items:center;border-radius:999px;background:#e8efff;color:#173891;padding:3px 8px;font-size:11px;font-weight:900;margin-left:6px}
@media(max-width:900px){.top{align-items:flex-start;flex-direction:column}.actions{width:100%;justify-content:stretch}.actions a,.actions button{text-align:center;flex:1}.layout{grid-template-columns:1fr}.toolbar,.formgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="page">
  <section class="top">
    <div class="brand">
      <div class="mark"><img src="/assets/smart-logo.png" alt="SMART Trak"></div>
      <div>
        <h1>Keep Trak</h1>
        <div class="sub">Practice briefing notes, reminders, and updates.</div>
        <div id="lastUpdated" class="updated">Loading Keep Trak...</div>
      </div>
    </div>
    <div class="actions">
      <a id="dashboardLink" class="linkbtn" href="/dashboard.html">Dashboard</a>
      <a id="calendarLink" class="linkbtn secondary" href="/training-calendar.html">Training Calendar</a>
      <a id="weatherLink" class="linkbtn secondary" href="/weather.html">Weather</a>
      <button id="refreshBtn" class="ghost" type="button">Refresh</button>
    </div>
  </section>

  <section class="panel">
    <div class="panelbody toolbar">
      <button id="prevBtn" class="secondary" type="button">Previous</button>
      <label>Date
        <input id="dateInput" type="date">
      </label>
      <button id="todayBtn" class="secondary" type="button">Today</button>
      <div id="rangeStatus" class="status"></div>
      <button id="nextBtn" class="secondary" type="button">Next</button>
    </div>
  </section>

  <section id="cleanupPanel" class="panel cleanup" hidden>
    <div class="panelhead"><h2>30-Day Cleanup</h2><span id="cleanupStatus" class="status"></span></div>
    <div class="panelbody">
      <div class="status">These Keep Trak notes are more than 30 days old. Select the ones you want to delete.</div>
      <div id="cleanupList" class="cleanup-list"></div>
      <div class="cleanup-actions">
        <button id="cleanupDeleteBtn" class="danger" type="button">Delete Selected</button>
        <button id="cleanupSelectBtn" class="secondary" type="button">Select All</button>
        <button id="cleanupSkipBtn" class="ghost" type="button">Not Now</button>
      </div>
    </div>
  </section>

  <section class="layout">
    <section class="panel">
      <div class="panelhead"><h2>Add / Edit Note</h2><span id="editStatus" class="status">New note</span></div>
      <div class="panelbody">
        <div class="formgrid">
          <label>Coach
            <input id="coachInput" type="text" placeholder="Coach name" autocomplete="off">
          </label>
          <button id="clearBtn" class="ghost" type="button">Clear</button>
        </div>
        <label style="margin-top:10px"><span class="labelrow"><span>Briefing Note</span><span id="charCount" class="status">0 / 4000</span></span>
          <textarea id="bodyInput" maxlength="4000" placeholder="Team briefing, reminder, practice change, deadline, weather note, character lesson..."></textarea>
        </label>
        <button id="saveBtn" type="button" style="margin-top:10px;width:100%">Save Note</button>
      </div>
    </section>

    <section class="panel">
      <div class="panelhead"><h2 id="listTitle">Notes</h2><span id="status" class="status"></span></div>
      <div class="panelbody">
        <div id="notesList" class="daylist"></div>
      </div>
    </section>
  </section>
</main>

<script>
var notes=[];
var cleanupNotes=[];
var editingId='';
var els={
  dashboardLink:document.getElementById('dashboardLink'),
  calendarLink:document.getElementById('calendarLink'),
  weatherLink:document.getElementById('weatherLink'),
  refreshBtn:document.getElementById('refreshBtn'),
  prevBtn:document.getElementById('prevBtn'),
  nextBtn:document.getElementById('nextBtn'),
  todayBtn:document.getElementById('todayBtn'),
  dateInput:document.getElementById('dateInput'),
  coachInput:document.getElementById('coachInput'),
  bodyInput:document.getElementById('bodyInput'),
  saveBtn:document.getElementById('saveBtn'),
  clearBtn:document.getElementById('clearBtn'),
  status:document.getElementById('status'),
  rangeStatus:document.getElementById('rangeStatus'),
  editStatus:document.getElementById('editStatus'),
  charCount:document.getElementById('charCount'),
  cleanupPanel:document.getElementById('cleanupPanel'),
  cleanupStatus:document.getElementById('cleanupStatus'),
  cleanupList:document.getElementById('cleanupList'),
  cleanupDeleteBtn:document.getElementById('cleanupDeleteBtn'),
  cleanupSelectBtn:document.getElementById('cleanupSelectBtn'),
  cleanupSkipBtn:document.getElementById('cleanupSkipBtn'),
  listTitle:document.getElementById('listTitle'),
  notesList:document.getElementById('notesList'),
  lastUpdated:document.getElementById('lastUpdated')
};
function cleanKey(value){return String(value||'').trim().toLowerCase().replace(/[^a-z0-9_-]/g,'')||'default';}
function accountKey(){try{var p=new URLSearchParams(window.location.search||'');return cleanKey(p.get('account')||p.get('tenant')||localStorage.getItem('sc_account')||'default');}catch(e){return 'default';}}
function embeddedMode(){try{var p=new URLSearchParams(window.location.search||'');return p.get('embed')==='1'||p.get('iframe')==='1'||p.get('embedded')==='1';}catch(e){return false;}}
function pageUrl(path){var url=new URL(path,window.location.origin);var key=accountKey();if(key&&key!=='default')url.searchParams.set('account',key);if(embeddedMode())url.searchParams.set('embed','1');return url.pathname+url.search;}
function accessStorageKey(){return 'sc_access_'+accountKey();}
function sessionStorageKey(){return 'sc_session_'+accountKey();}
function rememberedSessionStorageKey(){return 'sc_session_remembered_'+accountKey();}
function accessCode(){try{return localStorage.getItem(accessStorageKey())||'';}catch(e){return '';}}
function sessionToken(){try{return localStorage.getItem(rememberedSessionStorageKey())||sessionStorage.getItem(sessionStorageKey())||'';}catch(e){try{return sessionStorage.getItem(sessionStorageKey())||'';}catch(err){return '';}}}
function apiHeaders(extra){var headers=extra||{};headers['X-SMARTCoach-Account']=accountKey();var session=sessionToken();var code=accessCode();if(session)headers['X-SMARTCoach-Session']=session;if(code&&!session)headers['X-SMARTCoach-Access-Code']=code;return headers;}
function keepTrakUrl(){var url=new URL('/api/smart-trak/keep-trak',window.location.origin);var key=accountKey();if(key&&key!=='default')url.searchParams.set('account',key);url.searchParams.set('date',els.dateInput.value||todayISO());return url.pathname+url.search;}
function keepTrakAllUrl(){var url=new URL('/api/smart-trak/keep-trak',window.location.origin);var key=accountKey();if(key&&key!=='default')url.searchParams.set('account',key);return url.pathname+url.search;}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(value,days){var parts=String(value||todayISO()).split('-').map(Number);var d=new Date(parts[0],parts[1]-1,parts[2]);d.setDate(d.getDate()+days);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function esc(value){return String(value==null?'':value).replace(/[&<>"']/g,function(ch){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];});}
function js(value){return String(value||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function formatDate(value){var parts=String(value||'').split('-').map(Number);if(parts.length!==3)return value||'';var d=new Date(parts[0],parts[1]-1,parts[2]);if(isNaN(d.getTime()))return value||'';return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function formatDateTime(value){var d=value?new Date(value):new Date();if(isNaN(d.getTime()))d=new Date();return d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}
function noteDisplayTitle(){return 'Briefing note';}
function setStatus(text,type){els.status.textContent=text||'';els.status.style.color=type==='bad'?'#b00000':type==='good'?'var(--good)':'var(--muted)';}
function loadNotes(){
  setStatus('Loading Keep Trak...');
  return fetch(keepTrakUrl(),{cache:'no-store',headers:apiHeaders()}).then(function(res){
    return res.json().then(function(data){return{ok:res.ok,data:data};});
  }).then(function(result){
    if(!result.ok)throw new Error(result.data&&result.data.error||'Keep Trak could not load.');
    notes=Array.isArray(result.data&&result.data.notes)?result.data.notes:[];
    render();
    els.lastUpdated.textContent='Last updated '+formatDateTime(new Date().toISOString());
  }).catch(function(error){
    notes=[];
    render();
    setStatus(error&&error.message?error.message:'Keep Trak could not load.','bad');
    els.lastUpdated.textContent='Update failed';
  });
}
function render(){
  var date=els.dateInput.value||todayISO();
  els.listTitle.innerHTML='Notes for '+esc(formatDate(date))+(date===todayISO()?'<span class="today-badge">Today</span>':'');
  var open=notes.filter(function(note){return !note.completed;}).length;
  els.rangeStatus.textContent='Open notes from earlier days carry forward until completed.';
  setStatus(open+' open · '+notes.length+' total');
  if(!notes.length){
    els.notesList.innerHTML='<div class="empty">No Keep Trak notes for this day.</div>';
    return;
  }
  els.notesList.innerHTML=notes.map(function(note){
    var title=noteDisplayTitle(note);
    var meta=[formatDate(note.date),note.coachName||'Coach',note.completed?'Completed':'Open'].join(' · ');
    return '<article class="note '+(note.completed?'completed':'')+'"><div class="notehead"><div><div class="notetitle">'+esc(title)+'</div><div class="notemeta">'+esc(meta)+'</div></div></div><div class="notebody">'+esc(note.body||note.title||'')+'</div><div class="noteactions"><button class="secondary" type="button" onclick="editNote(\''+js(note.id)+'\')">Edit</button><button class="secondary" type="button" onclick="toggleNote(\''+js(note.id)+'\','+(!note.completed)+')">'+(note.completed?'Reopen':'Complete')+'</button><button class="danger" type="button" onclick="deleteNote(\''+js(note.id)+'\')">Delete</button></div></article>';
  }).join('');
}
function clearForm(){
  editingId='';
  els.bodyInput.value='';
  els.editStatus.textContent='New note';
  updateCharCount();
}
function editNote(id){
  var note=notes.find(function(item){return item.id===id;});
  if(!note)return;
  editingId=id;
  els.coachInput.value=note.coachName||els.coachInput.value;
  els.bodyInput.value=note.body||'';
  els.editStatus.textContent='Editing '+formatDate(note.date);
  updateCharCount();
  els.bodyInput.focus();
}
function notePayload(overrides){
  var existing=editingId?notes.find(function(item){return item.id===editingId;})||{}:{};
  var body=els.bodyInput.value.trim();
  return Object.assign({},existing,{
    id:editingId||'keep_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7),
    date:existing.date||els.dateInput.value||todayISO(),
    title:'',
    body:body,
    coachName:els.coachInput.value.trim()||existing.coachName||'Coach',
    updatedAt:new Date().toISOString(),
    createdAt:existing.createdAt||new Date().toISOString()
  },overrides||{});
}
function saveNote(){
  if(!els.bodyInput.value.trim()){setStatus('Write a note first.','bad');return;}
  var payload=notePayload();
  saveNotes([payload]).then(function(){clearForm();return loadNotes();}).catch(function(error){setStatus(error&&error.message?error.message:'Keep Trak could not save.','bad');});
}
function updateCharCount(){
  var count=(els.bodyInput.value||'').length;
  els.charCount.textContent=count+' / 4000';
  els.charCount.style.color=count>3800?'#b45309':'var(--muted)';
}
function cleanupCutoffDate(){
  return addDays(todayISO(),-30);
}
function loadCleanupNotes(){
  return fetch(keepTrakAllUrl(),{cache:'no-store',headers:apiHeaders()}).then(function(res){
    return res.json().then(function(data){return{ok:res.ok,data:data};});
  }).then(function(result){
    if(!result.ok)throw new Error(result.data&&result.data.error||'Keep Trak cleanup could not load.');
    var cutoff=cleanupCutoffDate();
    cleanupNotes=(Array.isArray(result.data&&result.data.notes)?result.data.notes:[]).filter(function(note){
      return note&&note.id&&note.date&&note.date<cutoff;
    });
    renderCleanupPrompt();
  }).catch(function(){
    cleanupNotes=[];
    renderCleanupPrompt();
  });
}
function renderCleanupPrompt(){
  if(!cleanupNotes.length){
    els.cleanupPanel.hidden=true;
    return;
  }
  els.cleanupPanel.hidden=false;
  els.cleanupStatus.textContent=cleanupNotes.length+' older than 30 days';
  els.cleanupList.innerHTML=cleanupNotes.map(function(note){
    var detail=[formatDate(note.date),note.coachName||'Coach',note.completed?'Completed':'Open'].join(' · ');
    return '<label class="cleanup-row"><input type="checkbox" data-cleanup-id="'+esc(note.id)+'" checked><span><b>'+esc(noteDisplayTitle(note))+'</b><span>'+esc(detail)+'</span><span>'+esc(String(note.body||note.title||'').slice(0,180))+'</span></span></label>';
  }).join('');
}
function selectedCleanupIds(){
  return Array.prototype.slice.call(els.cleanupList.querySelectorAll('input[data-cleanup-id]:checked')).map(function(input){return input.getAttribute('data-cleanup-id');}).filter(Boolean);
}
function selectAllCleanupNotes(){
  Array.prototype.slice.call(els.cleanupList.querySelectorAll('input[data-cleanup-id]')).forEach(function(input){input.checked=true;});
}
function skipCleanupPrompt(){
  els.cleanupPanel.hidden=true;
}
function deleteSelectedCleanupNotes(){
  var ids=selectedCleanupIds();
  if(!ids.length){els.cleanupStatus.textContent='Select at least one note to delete.';return;}
  if(!confirm('Delete '+ids.length+' Keep Trak note'+(ids.length===1?'':'s')+' older than 30 days?'))return;
  els.cleanupStatus.textContent='Deleting selected notes...';
  saveNotes([],ids).then(function(){
    cleanupNotes=cleanupNotes.filter(function(note){return ids.indexOf(note.id)<0;});
    renderCleanupPrompt();
    return loadNotes();
  }).catch(function(error){
    els.cleanupStatus.textContent=error&&error.message?error.message:'Cleanup delete failed.';
  });
}
function toggleNote(id,completed){
  var note=notes.find(function(item){return item.id===id;});
  if(!note)return;
  note.completed=!!completed;
  note.completedAt=completed?new Date().toISOString():'';
  note.completedBy=completed?(els.coachInput.value.trim()||note.coachName||'Coach'):'';
  saveNotes([note]).then(loadNotes).catch(function(error){setStatus(error&&error.message?error.message:'Keep Trak could not update.','bad');});
}
function deleteNote(id){
  if(!confirm('Delete this Keep Trak note?'))return;
  saveNotes([],[id]).then(function(){if(editingId===id)clearForm();return loadNotes();}).catch(function(error){setStatus(error&&error.message?error.message:'Keep Trak could not delete.','bad');});
}
function saveNotes(rows,deleteIds){
  setStatus('Saving Keep Trak...');
  return fetch(keepTrakUrl(),{
    method:'POST',
    headers:apiHeaders({'Content-Type':'application/json'}),
    body:JSON.stringify({notes:rows||[],deleteIds:deleteIds||[]})
  }).then(function(res){
    return res.json().then(function(data){return{ok:res.ok,data:data};});
  }).then(function(result){
    if(!result.ok)throw new Error(result.data&&result.data.error||'Keep Trak save failed.');
    if(result.data&&result.data.success===false)throw new Error(result.data.reason||'Keep Trak did not save to SMART Trak.');
    return result.data;
  });
}
function changeDay(days){els.dateInput.value=addDays(els.dateInput.value||todayISO(),days);clearForm();loadNotes();}
function init(){
  if(embeddedMode())document.body.classList.add('embedded');
  try{localStorage.setItem('sc_account',accountKey());}catch(e){}
  els.dashboardLink.href=pageUrl('/dashboard.html');
  els.calendarLink.href=pageUrl('/training-calendar.html');
  els.weatherLink.href=pageUrl('/weather.html');
  els.dateInput.value=todayISO();
  els.refreshBtn.addEventListener('click',loadNotes);
  els.prevBtn.addEventListener('click',function(){changeDay(-1);});
  els.nextBtn.addEventListener('click',function(){changeDay(1);});
  els.todayBtn.addEventListener('click',function(){els.dateInput.value=todayISO();clearForm();loadNotes();});
  els.dateInput.addEventListener('change',function(){clearForm();loadNotes();});
  els.saveBtn.addEventListener('click',saveNote);
  els.clearBtn.addEventListener('click',clearForm);
  els.cleanupDeleteBtn.addEventListener('click',deleteSelectedCleanupNotes);
  els.cleanupSelectBtn.addEventListener('click',selectAllCleanupNotes);
  els.cleanupSkipBtn.addEventListener('click',skipCleanupPrompt);
  els.bodyInput.addEventListener('input',updateCharCount);
  updateCharCount();
  loadNotes();
  loadCleanupNotes();
}
init();
</script>
</body>
</html>
