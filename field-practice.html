<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Field Practice</title>
<style>
:root{--blue:#2B4FCC;--ink:#111827;--muted:#526481;--line:#dbe3ef;--bg:#eef3f9;--white:#fff;--good:#08783c;--bad:#b91c1c;--warn:#b45309}
*{box-sizing:border-box}[hidden]{display:none!important}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body.embedded .page{max-width:none;padding:16px 18px 28px}.page{max-width:1480px;margin:0 auto;padding:20px 18px 32px}
.top{position:sticky;top:10px;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:16px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px;box-shadow:0 12px 28px rgba(15,23,42,.08)}
.brand{display:flex;align-items:center;gap:12px}.mark{width:62px;height:62px;display:grid;place-items:center;flex:0 0 62px}.mark img{max-width:58px;max-height:58px;object-fit:contain}
h1{font-size:26px;line-height:1.1;margin:0}.sub{font-size:14px;color:var(--muted);margin-top:4px}.updated{display:inline-flex;margin-top:8px;border:1px solid var(--line);border-radius:8px;background:#f8fbff;color:#334155;font-size:13px;font-weight:800;padding:7px 10px}
.actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}button,.linkbtn{border:0;border-radius:8px;background:var(--blue);color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:8px 11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:34px}button.secondary,.linkbtn.secondary{background:#dde3ed;color:#172033}button.modal-action,.linkbtn.modal-action{background:#eef6ff;color:#173891;border:1px solid #bfd0ef}button.ghost{background:#eef2f7;color:#172033}button.utility-action{background:#f8fafc;color:#334155;border:1px solid var(--line)}button.danger{background:#fee2e2;color:#991b1b}button:disabled{opacity:.55;cursor:not-allowed}.top .linkbtn,.top button{font-size:13px;padding:7px 10px;min-height:34px;white-space:nowrap}
.grid{display:grid;grid-template-columns:minmax(340px,.8fr) minmax(0,1.2fr);gap:14px;align-items:start}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:14px}.panelhead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}.panelhead h2{font-size:18px;margin:0}.panelbody{padding:14px 16px}
.formgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.full{grid-column:1/-1}label{display:grid;gap:5px;color:#435066;font-size:12px;font-weight:900;letter-spacing:.03em;text-transform:uppercase}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:#111827;font:14px inherit;padding:10px 12px}textarea{min-height:92px;resize:vertical;line-height:1.4}.status{color:var(--muted);font-size:13px;font-weight:800}.hint{color:var(--muted);font-size:12px;line-height:1.35}
.drills{display:grid;gap:7px}.drill{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;border:1px solid var(--line);border-radius:8px;background:#fbfdff;padding:9px}.drill input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--blue)}.drill b{display:block;font-size:14px}.drill small{display:block;color:var(--muted);font-size:12px;margin-top:2px}.attemptbar{display:grid;grid-template-columns:1fr 1fr 1fr 2fr auto;gap:8px;align-items:end}.attempts{display:grid;gap:8px;margin-top:10px}.attempt{display:grid;grid-template-columns:70px 96px 80px 1fr auto;gap:8px;align-items:center;border:1px solid var(--line);border-radius:8px;background:#fbfdff;padding:8px}.attemptpatterns{display:grid;gap:7px;margin-top:10px}.attemptpattern{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;border-left:4px solid var(--blue);border-radius:8px;background:#f8fafc;border-top:1px solid var(--line);border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px 10px}.attemptpattern b{display:block;font-size:15px}.attemptpattern small{display:block;color:var(--muted);font-weight:800;margin-top:2px}.patterncode{font-weight:950;letter-spacing:.08em;color:#172033}.result{font-size:22px;font-weight:950;text-align:center}.result.make{color:var(--good)}.result.miss{color:var(--bad)}.result.pass{color:var(--warn)}.list{display:grid;gap:8px}.practice{border:1px solid var(--line);border-radius:8px;background:#fbfdff;padding:12px}.practice h3{margin:0 0 4px;font-size:16px}.practice .meta{color:var(--muted);font-size:12px;font-weight:800}.practice .summary{margin-top:8px;font-size:13px;line-height:1.4}.practice .row{display:flex;align-items:center;justify-content:space-between;gap:8px}.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.chip{display:inline-flex;border-radius:999px;background:#e8efff;color:#173891;padding:3px 8px;font-size:11px;font-weight:900}.empty{text-align:center;color:var(--muted);padding:22px}.preview{white-space:pre-wrap;border:1px solid var(--line);border-radius:8px;background:#f8fafc;padding:10px;font-size:13px;line-height:1.45}
@media(max-width:900px){.top{align-items:flex-start;flex-direction:column}.actions{width:100%;justify-content:stretch}.actions a,.actions button{flex:1}.grid,.formgrid,.attemptbar,.attempt{grid-template-columns:1fr}.full{grid-column:auto}}
</style>
</head>
<body>
<main class="page">
  <section class="top">
    <div class="brand">
      <div class="mark"><img data-brand-logo src="/assets/smart-logo.png" alt="SMART Trak"></div>
      <div>
        <h1>Field Practice</h1>
        <div class="sub">Field event drill checklists, practice focus, and attempt notes.</div>
        <div id="lastUpdated" class="updated">Loading Field Practice...</div>
      </div>
    </div>
    <div class="actions">
      <a id="dashboardLink" class="linkbtn" href="/dashboard.html">Dashboard</a>
      <a id="calendarLink" class="linkbtn modal-action" href="/training-calendar.html">Training</a>
      <a id="athletesLink" class="linkbtn modal-action" href="/athletes.html">Athletes</a>
      <button id="newBtn" class="modal-action" type="button">New Practice</button>
      <button id="refreshBtn" class="utility-action" type="button">Refresh</button>
    </div>
  </section>

  <section class="grid">
    <section>
      <section class="panel">
        <div class="panelhead"><h2>Practice Setup</h2><span id="saveStatus" class="status"></span></div>
        <div class="panelbody">
          <div class="formgrid">
            <label>Date <input id="practiceDate" type="date"></label>
            <label>Event <select id="eventSelect"><option>Pole Vault</option><option>High Jump</option><option>Long Jump</option><option>Triple Jump</option><option>Shot Put</option><option>Discus</option><option>Javelin</option><option>Hammer</option></select></label>
            <label>Group <select id="groupSelect"><option value="">Team / no group</option></select></label>
            <label>Athlete <select id="athleteSelect"><option value="">Whole group</option></select></label>
            <label>Practice Focus
              <select id="focusSelect">
                <option>Approach consistency</option><option>Plant mechanics</option><option>Takeoff</option><option>Swing</option><option>Turn</option><option>Bar clearance</option><option>Short approach jumps</option><option>Full approach jumps</option><option>Meet prep</option><option>Custom</option>
              </select>
            </label>
            <label>Drill Routine
              <select id="routineSelect"></select>
            </label>
            <label>Setup <select id="setupSelect"><option value="">No jumps today</option><option>Bungee</option><option>Crossbar</option></select></label>
            <label>Height <input id="heightInput" placeholder="9-0"></label>
            <label class="full">Practice Plan / Athlete Preview <textarea id="planNotes" placeholder="What athletes should know before practice..."></textarea></label>
            <label class="full">Coach Notes <textarea id="coachNotes" placeholder="Private notes after practice..."></textarea></label>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panelhead"><h2>Drill Checklist</h2><button id="addDrillBtn" class="secondary" type="button">Add Drill</button></div>
        <div class="panelbody"><div id="drillList" class="drills"></div></div>
      </section>

      <section class="panel">
        <div class="panelhead"><h2>Jump Attempts</h2><span id="attemptSummary" class="status"></span></div>
        <div class="panelbody">
          <div class="attemptbar">
            <label>Result <select id="attemptResult"><option value="O">Make O</option><option value="X">Miss X</option><option value="-">Pass -</option></select></label>
            <label>Setup <select id="attemptSetup"><option>Bungee</option><option>Crossbar</option></select></label>
            <label>Height <input id="attemptHeight" placeholder="9-0"></label>
            <label>Attempt Note <input id="attemptNote" placeholder="late plant, better knee drive..."></label>
            <button id="addAttemptBtn" type="button">Add</button>
          </div>
          <div id="attemptPattern" class="attemptpatterns"></div>
          <div id="attemptList" class="attempts"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panelhead"><h2>Athlete Preview</h2><button id="copyPreviewBtn" class="secondary" type="button">Copy Preview</button></div>
        <div class="panelbody"><div id="athletePreview" class="preview"></div></div>
      </section>

      <div class="actions" style="justify-content:flex-start;margin-bottom:16px">
        <button id="saveBtn" type="button">Save Field Practice</button>
        <button id="deleteBtn" class="danger" type="button" hidden>Delete</button>
      </div>
    </section>

    <section class="panel">
      <div class="panelhead"><h2>Saved Practices</h2><span id="listStatus" class="status"></span></div>
      <div class="panelbody"><div id="practiceList" class="list"><div class="empty">Loading practices...</div></div></div>
    </section>
  </section>
</main>
<script>
var practices=[],athletes=[],groups=[],currentId='',drills=[],attempts=[];
var routines={
  pv_beginner:['Dynamic warmup','Pole carry posture','Walking plant drill','3-step pop ups','Sand pit takeoffs','Core cooldown'],
  pv_plant:['Dynamic warmup','Pole runs','Slide-box plant drill','3-step plant to takeoff','4-step plant rhythm','Coach video review'],
  pv_short:['Dynamic warmup','Approach check marks','3-left short approach jumps','Bungee clearance work','Landing position review','Cooldown notes'],
  pv_bar:['Dynamic warmup','Short approach bar clearance','Swing and turn drill','Bungee to crossbar progression','Meet-height confidence reps','Review best cues'],
  pv_meet:['Warmup routine rehearsal','Runway marks check','First-attempt rhythm reps','Opening height confidence jumps','Meet cue review','Recovery cooldown'],
  hj_approach:['Dynamic warmup','Curve runs','Check mark rhythm','Penultimate step drill','Scissor jumps','Landing review'],
  hj_takeoff:['Dynamic warmup','Takeoff posture drill','3-step pop ups','Knee drive drill','Bungee jumps','Cooldown notes'],
  lj_approach:['Dynamic warmup','Runway acceleration','Check mark consistency','Board accuracy reps','Pop up drill','Landing mechanics'],
  lj_takeoff:['Dynamic warmup','Penultimate step drill','Takeoff posture','Short approach jumps','Landing sweep drill','Video review'],
  tj_rhythm:['Dynamic warmup','Hop-hop rhythm','Hop-step rhythm','Bounds','Short approach triple jumps','Landing mechanics'],
  tj_phases:['Dynamic warmup','Hop phase drill','Step phase drill','Jump phase drill','Phase balance review','Cooldown notes'],
  sp_power:['Dynamic warmup','Wrist flicks','Power position throws','Block side drill','Full throws','Release notes'],
  sp_glide:['Dynamic warmup','Stand throws','A drill','Glide to power position','Full glide throws','Video review'],
  disc_stand:['Dynamic warmup','South African drill','Stand throws','Wheel drill','Full throws','Sector review'],
  disc_full:['Dynamic warmup','Entry drill','Middle balance drill','Power position finish','Full throws','Video review'],
  jav_approach:['Dynamic warmup','Grip/release drill','Carry runs','Crossover rhythm','Short approach throws','Recovery notes'],
  hammer_turns:['Dynamic warmup','Winds','One-turn drill','Two-turn drill','Release rhythm','Footwork review'],
  custom:['Custom drill']
};
var eventRoutineDefaults={'Pole Vault':'pv_beginner','High Jump':'hj_approach','Long Jump':'lj_approach','Triple Jump':'tj_rhythm','Shot Put':'sp_power','Discus':'disc_stand','Javelin':'jav_approach','Hammer':'hammer_turns'};
var eventRoutineMap={
  'Pole Vault':['pv_beginner','pv_plant','pv_short','pv_bar','pv_meet','custom'],
  'High Jump':['hj_approach','hj_takeoff','custom'],
  'Long Jump':['lj_approach','lj_takeoff','custom'],
  'Triple Jump':['tj_rhythm','tj_phases','custom'],
  'Shot Put':['sp_power','sp_glide','custom'],
  'Discus':['disc_stand','disc_full','custom'],
  'Javelin':['jav_approach','custom'],
  'Hammer':['hammer_turns','custom']
};
var routineLabels={
  pv_beginner:'Beginner pole vault routine',pv_plant:'Plant mechanics routine',pv_short:'Short approach routine',pv_bar:'Bar clearance routine',pv_meet:'Meet week routine',
  hj_approach:'High jump approach routine',hj_takeoff:'High jump takeoff routine',
  lj_approach:'Long jump approach routine',lj_takeoff:'Long jump takeoff routine',
  tj_rhythm:'Triple jump rhythm routine',tj_phases:'Triple jump phase routine',
  sp_power:'Shot put power routine',sp_glide:'Shot put glide routine',
  disc_stand:'Discus stand throw routine',disc_full:'Discus full throw routine',
  jav_approach:'Javelin approach routine',hammer_turns:'Hammer turn routine',custom:'Custom routine'
};
var els={};
function $(id){return document.getElementById(id);}
function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function escAttr(v){return esc(v).replace(/"/g,'&quot;');}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function normalizeHeight(mark){var text=String(mark||'').trim().toLowerCase().replace(/\s+/g,'');text=text.replace(/[′’]/g,"'").replace(/[″"]/g,'');text=text.replace(/'/g,'-');text=text.replace(/[^\d.\-]/g,'');if(!text)return'';var parts=text.split('-').filter(function(part,index){return index===0||part!=='';});var feet=0,inches=0;if(parts.length>1){feet=parseInt(parts[0],10);inches=parseFloat(parts.slice(1).join('.'));}else{feet=parseInt(parts[0],10);inches=0;}if(!isFinite(feet)||feet<0||!isFinite(inches)||inches<0)return'';inches=Math.round(inches*4)/4;while(inches>=12){feet+=1;inches-=12;}var inchText=String(Math.floor(inches));var fraction=Number((inches-Math.floor(inches)).toFixed(2));if(fraction)inchText+=fraction===0.25?'.25':fraction===0.5?'.5':fraction===0.75?'.75':'';return feet+'-'+inchText;}
function normalizeHeightInput(input){var value=normalizeHeight(input.value);if(input.value.trim()&&!value){$('saveStatus').textContent='Enter heights as feet-inches with quarter inches, like 9-0.25.';return'';}input.value=value;return value;}
function attemptCode(result){return result==='-'?'P':result||'';}
function attemptGroups(items){var map={};(items||[]).forEach(function(a){var height=normalizeHeight(a.height)||a.height||'No height';var setup=a.setupType||'Setup';var key=setup+'|'+height;if(!map[key])map[key]={setupType:setup,height:height,codes:[],notes:[]};map[key].codes.push(attemptCode(a.result));if(a.note)map[key].notes.push(a.note);});return Object.keys(map).map(function(key){return map[key];});}
function attemptPatternLines(items){return attemptGroups(items).map(function(group){return group.height+' '+group.setupType+' ['+group.codes.join('')+']';});}
function embeddedMode(){try{var p=new URLSearchParams(location.search||'');return p.get('embed')==='1'||p.get('iframe')==='1';}catch(e){return false;}}
function smartCoachAccountKey(){try{var p=new URLSearchParams(location.search||'');var key=(p.get('account')||localStorage.getItem('sc_account')||'default').trim();if(key&&key!=='default')localStorage.setItem('sc_account',key);return key||'default';}catch(e){return 'default';}}
function apiUrl(path){var url=new URL(path,location.origin);var account=smartCoachAccountKey();if(account&&account!=='default')url.searchParams.set('account',account);return url.pathname+url.search;}
function pageUrl(path){var url=new URL(path,location.origin);var account=smartCoachAccountKey();if(account&&account!=='default')url.searchParams.set('account',account);if(embeddedMode())url.searchParams.set('embed','1');return url.pathname+url.search;}
function accessStorageKey(){return 'sc_access_'+smartCoachAccountKey();}
function sessionStorageKey(){return 'sc_session_'+smartCoachAccountKey();}
function rememberedSessionStorageKey(){return 'sc_session_remembered_'+smartCoachAccountKey();}
function accessCode(){try{return localStorage.getItem(accessStorageKey())||'';}catch(e){return '';}}
function sessionToken(){try{return localStorage.getItem(rememberedSessionStorageKey())||sessionStorage.getItem(sessionStorageKey())||'';}catch(e){try{return sessionStorage.getItem(sessionStorageKey())||'';}catch(err){return '';}}}
function headers(){var h={'Content-Type':'application/json'};var account=smartCoachAccountKey();if(account&&account!=='default')h['X-SMARTCoach-Account']=account;var session=sessionToken();var code=accessCode();if(session)h['X-SMARTCoach-Session']=session;if(code&&!session)h['X-SMARTCoach-Access-Code']=code;return h;}
function jsonResult(res){return res.json().then(function(data){if(!res.ok)throw new Error(data&&data.error||'Request failed.');return data;});}
function init(){
  ['dashboardLink','calendarLink','athletesLink','newBtn','refreshBtn','practiceDate','routineSelect','setupSelect','heightInput','attemptSetup','attemptHeight','addDrillBtn','addAttemptBtn','saveBtn','deleteBtn','copyPreviewBtn'].forEach(function(id){els[id]=$(id);});
  document.body.classList.toggle('embedded',embeddedMode());
  els.dashboardLink.href=pageUrl('/dashboard.html');els.calendarLink.href=pageUrl('/training-calendar.html');els.athletesLink.href=pageUrl('/athletes.html');
  els.practiceDate.value=todayISO();renderRoutineOptions(eventRoutineDefaults[$('eventSelect').value]||'pv_beginner');resetRoutine();
  els.newBtn.onclick=newPractice;els.refreshBtn.onclick=loadAll;$('eventSelect').onchange=function(){renderRoutineOptions(eventRoutineDefaults[$('eventSelect').value]||'custom');resetRoutine();};els.routineSelect.onchange=resetRoutine;els.setupSelect.onchange=syncAttemptDefaults;els.heightInput.oninput=syncAttemptDefaults;els.heightInput.onblur=function(){normalizeHeightInput(els.heightInput);syncAttemptDefaults();};els.attemptHeight.onblur=function(){normalizeHeightInput(els.attemptHeight);renderPreview();};els.addDrillBtn.onclick=addDrill;els.addAttemptBtn.onclick=addAttempt;els.saveBtn.onclick=savePractice;els.deleteBtn.onclick=deletePractice;els.copyPreviewBtn.onclick=copyPreview;
  ['eventSelect','groupSelect','athleteSelect','focusSelect','planNotes','coachNotes','attemptResult','attemptSetup','attemptHeight','attemptNote'].forEach(function(id){$(id).addEventListener('input',renderPreview);$(id).addEventListener('change',renderPreview);});
  loadAll();
}
function loadAll(){
  $('lastUpdated').textContent='Loading Field Practice...';
  Promise.all([
    fetch(apiUrl('/api/smart-trak/field-practice'),{cache:'no-store',headers:headers()}).then(jsonResult).catch(function(){return{practices:[]};}),
    fetch(apiUrl('/api/smart-trak/athletes'),{cache:'no-store',headers:headers()}).then(jsonResult).catch(function(){return{athletes:[]};}),
    fetch(apiUrl('/api/smart-trak/groups'),{cache:'no-store',headers:headers()}).then(jsonResult).catch(function(){return{groups:[]};})
  ]).then(function(results){
    practices=results[0].practices||[];athletes=results[1].athletes||[];groups=(results[2].groups||[]).filter(function(g){return !g.archived&&String(g.type||'training')!=='meet';});
    renderGroups();renderAthletes();renderList();renderDrills();renderAttempts();renderPreview();
    $('lastUpdated').textContent='Last updated '+new Date().toLocaleString();
  }).catch(function(error){$('lastUpdated').textContent='Could not load Field Practice';$('saveStatus').textContent=error.message;});
}
function renderGroups(){var current=$('groupSelect').value;var html='<option value="">Team / no group</option>'+groups.map(function(g){return '<option value="'+escAttr(g.id||g.name)+'">'+esc(g.name||'Group')+'</option>';}).join('');$('groupSelect').innerHTML=html;$('groupSelect').value=current;renderAthletes();}
function groupAthleteIds(){var id=$('groupSelect').value;if(!id)return null;var group=groups.find(function(g){return String(g.id||g.name)===String(id);});if(!group)return null;var map={};(group.athletes||group.runners||[]).forEach(function(a){if(a.contactId)map[String(a.contactId)]=true;if(a.id)map[String(a.id)]=true;if(a.name)map['name:'+String(a.name).toLowerCase()]=true;});return map;}
function renderAthletes(){var current=$('athleteSelect').value;var ids=groupAthleteIds();var source=athletes.filter(function(a){if(!a.smartcoachActive)return false;if(!ids)return true;return ids[String(a.id)]||ids['name:'+String(a.name||'').toLowerCase()];});$('athleteSelect').innerHTML='<option value="">Whole group</option>'+source.map(function(a){return '<option value="'+escAttr(a.id)+'">'+esc(a.name||'Athlete')+'</option>';}).join('');$('athleteSelect').value=source.some(function(a){return String(a.id)===String(current);})?current:'';renderPreview();}
function renderRoutineOptions(selected){var event=$('eventSelect').value||'Pole Vault';var keys=eventRoutineMap[event]||['custom'];var value=keys.indexOf(selected)>=0?selected:(eventRoutineDefaults[event]||keys[0]);$('routineSelect').innerHTML=keys.map(function(key){return '<option value="'+escAttr(key)+'">'+esc(routineLabels[key]||key)+'</option>';}).join('');$('routineSelect').value=value;}
function resetRoutine(){var names=routines[$('routineSelect').value]||routines.custom;drills=names.map(function(name,index){return{id:'drill_'+(index+1),name:name,completed:false,note:''};});renderDrills();renderPreview();}
function addDrill(){drills.push({id:'drill_'+Date.now(),name:'Custom drill',completed:false,note:''});renderDrills();}
function renderDrills(){$('drillList').innerHTML=drills.length?drills.map(function(d,i){return '<label class="drill"><input type="checkbox" data-drill-check="'+i+'" '+(d.completed?'checked':'')+'><span><b contenteditable="true" data-drill-name="'+i+'">'+esc(d.name)+'</b><small contenteditable="true" data-drill-note="'+i+'">'+esc(d.note||'Add note')+'</small></span></label>';}).join(''):'<div class="empty">No drills loaded.</div>';Array.prototype.slice.call(document.querySelectorAll('[data-drill-check]')).forEach(function(el){el.onchange=function(){drills[Number(el.dataset.drillCheck)].completed=el.checked;renderPreview();};});Array.prototype.slice.call(document.querySelectorAll('[data-drill-name]')).forEach(function(el){el.oninput=function(){drills[Number(el.dataset.drillName)].name=el.textContent.trim();renderPreview();};});Array.prototype.slice.call(document.querySelectorAll('[data-drill-note]')).forEach(function(el){el.oninput=function(){drills[Number(el.dataset.drillNote)].note=el.textContent.trim();renderPreview();};});}
function syncAttemptDefaults(){if($('setupSelect').value)$('attemptSetup').value=$('setupSelect').value;if($('heightInput').value&&!$('attemptHeight').value)$('attemptHeight').value=$('heightInput').value;renderPreview();}
function addAttempt(){var result=$('attemptResult').value;var rawHeight=$('attemptHeight').value||$('heightInput').value;var height=normalizeHeight(rawHeight);if(rawHeight&&!height){$('saveStatus').textContent='Enter heights as feet-inches with quarter inches, like 9-0.25.';return;}if(height)$('attemptHeight').value=height;attempts.push({id:'attempt_'+Date.now(),result:result,setupType:$('attemptSetup').value,height:height,note:$('attemptNote').value});$('attemptNote').value='';$('saveStatus').textContent='';renderAttempts();renderPreview();}
function renderAttempts(){var makes=attempts.filter(function(a){return a.result==='O';}).length,misses=attempts.filter(function(a){return a.result==='X';}).length,passes=attempts.filter(function(a){return a.result==='-';}).length;$('attemptSummary').textContent=attempts.length+' attempts · '+makes+' makes · '+misses+' misses'+(passes?' · '+passes+' passes':'');var patterns=attemptGroups(attempts);$('attemptPattern').innerHTML=patterns.length?patterns.map(function(group){return '<div class="attemptpattern"><span><b>'+esc(group.height+' '+group.setupType)+'</b><small>'+esc(group.notes.length?group.notes.join(' · '):'Attempt pattern')+'</small></span><span class="patterncode">['+esc(group.codes.join(''))+']</span></div>';}).join(''):'';$('attemptList').innerHTML=attempts.length?attempts.map(function(a,i){var cls=a.result==='O'?'make':a.result==='X'?'miss':'pass';return '<div class="attempt"><div class="result '+cls+'">'+esc(attemptCode(a.result)||'')+'</div><div>'+esc(a.setupType||'Setup')+'</div><div>'+esc(a.height||'--')+'</div><input data-attempt-note="'+i+'" value="'+escAttr(a.note||'')+'" placeholder="Attempt note"><button class="ghost" type="button" data-remove-attempt="'+i+'">Remove</button></div>';}).join(''):'<div class="empty">No jump attempts yet.</div>';Array.prototype.slice.call(document.querySelectorAll('[data-remove-attempt]')).forEach(function(el){el.onclick=function(){attempts.splice(Number(el.dataset.removeAttempt),1);renderAttempts();renderPreview();};});Array.prototype.slice.call(document.querySelectorAll('[data-attempt-note]')).forEach(function(el){el.oninput=function(){attempts[Number(el.dataset.attemptNote)].note=el.value;renderAttempts();renderPreview();};});}
function selectedGroup(){var id=$('groupSelect').value;return groups.find(function(g){return String(g.id||g.name)===String(id);})||{};}
function selectedAthlete(){var id=$('athleteSelect').value;return athletes.find(function(a){return String(a.id)===String(id);})||{};}
function practicePayload(){var group=selectedGroup(),athlete=selectedAthlete();return{id:currentId||'',date:$('practiceDate').value,event:$('eventSelect').value,groupId:group.id||'',groupName:group.name||'',athleteId:athlete.id||'',athleteName:athlete.name||'',focus:$('focusSelect').value,routineKey:$('routineSelect').value,routineName:$('routineSelect').options[$('routineSelect').selectedIndex].text,setupType:$('setupSelect').value,height:normalizeHeight($('heightInput').value)||$('heightInput').value,drills:drills,attempts:attempts,attemptSummary:attemptPatternLines(attempts).join('; '),planNotes:$('planNotes').value,coachNotes:$('coachNotes').value,updatedAt:new Date().toISOString()};}
function renderPreview(){var p=practicePayload();var lines=['Field Practice: '+p.event,'Date: '+p.date,'Focus: '+(p.focus||'Not set'),'Routine: '+(p.routineName||'Not set')];if(p.setupType||p.height)lines.push('Jumps: '+[p.setupType,p.height].filter(Boolean).join(' at '));if(p.planNotes)lines.push('',p.planNotes);lines.push('','Drills:');drills.forEach(function(d){lines.push((d.completed?'[x] ':'[ ] ')+d.name);});var patterns=attemptPatternLines(attempts);if(patterns.length){lines.push('','Attempt summary:');patterns.forEach(function(line){lines.push(line);});lines.push('','Jump log:');attempts.forEach(function(a){lines.push([a.height,a.setupType,attemptCode(a.result),a.note].filter(Boolean).join(' · '));});}$('athletePreview').textContent=lines.join('\n');}
function savePractice(){var payload=practicePayload();if(!payload.date){$('saveStatus').textContent='Choose a date.';return;}if(!payload.id)payload.id='field_'+Date.now();currentId=payload.id;$('saveStatus').textContent='Saving...';fetch(apiUrl('/api/smart-trak/field-practice'),{method:'POST',headers:headers(),body:JSON.stringify({practice:payload})}).then(jsonResult).then(function(data){practices=data.practices||practices;$('saveStatus').textContent='Saved field practice.';$('deleteBtn').hidden=false;renderList();}).catch(function(error){$('saveStatus').textContent='Could not save: '+error.message;});}
function deletePractice(){if(!currentId||!confirm('Delete this field practice?'))return;fetch(apiUrl('/api/smart-trak/field-practice'),{method:'POST',headers:headers(),body:JSON.stringify({deleteIds:[currentId]})}).then(jsonResult).then(function(data){practices=data.practices||[];newPractice();renderList();$('saveStatus').textContent='Deleted field practice.';});}
function newPractice(){currentId='';$('practiceDate').value=todayISO();$('groupSelect').value='';renderAthletes();$('athleteSelect').value='';$('focusSelect').value='Approach consistency';renderRoutineOptions(eventRoutineDefaults[$('eventSelect').value]||'pv_beginner');$('setupSelect').value='';$('heightInput').value='';$('planNotes').value='';$('coachNotes').value='';attempts=[];resetRoutine();renderAttempts();$('deleteBtn').hidden=true;$('saveStatus').textContent='';}
function openPractice(id){var p=practices.find(function(x){return x.id===id;});if(!p)return;currentId=p.id;$('practiceDate').value=p.date||todayISO();$('eventSelect').value=p.event||'Pole Vault';$('groupSelect').value=p.groupId||'';renderAthletes();$('athleteSelect').value=p.athleteId||'';$('focusSelect').value=p.focus||'Approach consistency';renderRoutineOptions(p.routineKey||eventRoutineDefaults[$('eventSelect').value]||'custom');$('setupSelect').value=p.setupType||'';$('heightInput').value=p.height||'';$('planNotes').value=p.planNotes||'';$('coachNotes').value=p.coachNotes||'';drills=p.drills||[];attempts=p.attempts||[];renderDrills();renderAttempts();renderPreview();$('deleteBtn').hidden=false;}
function renderList(){var list=$('practiceList');$('listStatus').textContent=practices.length+' saved';list.innerHTML=practices.length?practices.map(function(p){var complete=(p.drills||[]).filter(function(d){return d.completed;}).length;var makes=(p.attempts||[]).filter(function(a){return a.result==='O';}).length;var pattern=p.attemptSummary||attemptPatternLines(p.attempts||[]).join('; ');return '<article class="practice"><div class="row"><h3>'+esc(p.date+' · '+p.event)+'</h3><button class="secondary" type="button" onclick="openPractice(&quot;'+escAttr(p.id)+'&quot;)">Open</button></div><div class="meta">'+esc([p.groupName||'Team',p.athleteName||'Whole group',p.focus].filter(Boolean).join(' · '))+'</div><div class="summary">'+complete+' of '+(p.drills||[]).length+' drills complete · '+(p.attempts||[]).length+' attempts · '+makes+' makes'+(pattern?'<br><b>'+esc(pattern)+'</b>':'')+'</div><div class="chips">'+(p.setupType?'<span class="chip">'+esc(p.setupType)+'</span>':'')+(p.height?'<span class="chip">'+esc(p.height)+'</span>':'')+'</div></article>';}).join(''):'<div class="empty">No field practices saved yet.</div>';}
function copyPreview(){var text=$('athletePreview').textContent||'';if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){$('saveStatus').textContent='Copied athlete preview.';});return;}$('saveStatus').textContent='Preview ready to copy.';}
document.addEventListener('DOMContentLoaded',init);
</script>
