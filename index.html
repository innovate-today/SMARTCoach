      <button class="sortbtn" id="ss-shortest" onclick="setSort('shortest')">Shortest</button>
    </div>
  </div>
</div>

<!-- ADD LOG MODAL -->
<div class="mover h" id="ml">
  <div class="msh">
    <div class="mhd"></div>
    <div class="mttl">New Group</div>
    <input class="minp" id="mln" placeholder="e.g. Workout 4" type="text" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false"/>
    <button class="mbtn" onclick="createLog()">Create</button>
    <button class="mbtn c" onclick="hm('ml')">Cancel</button>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="mover h" id="msh">
  <div class="msh">
    <div class="mhd"></div>
    <div class="mttl">Share Results</div>
    <div class="shbox" id="shtxt"></div>
    <button class="mbtn" onclick="copyShare()">Copy / Share</button>
    <button class="mbtn c" style="margin-top:8px" onclick="hm('msh')">Close</button>
  </div>
</div>

<script>
var logs=[], lid=1, rid=1, CL=null, CE=null, SM='latest', tk=null, TC={};

function save(){
  try{
    var s=logs.map(function(l){
      return{id:l.id,name:l.name,cfg:l.cfg,runners:l.runners.map(function(r){
        return{id:r.id,name:r.name,note:r.note||'',saved:r.saved||[]};
      })};
    });
    localStorage.setItem('sc1',JSON.stringify(s));
    localStorage.setItem('sc1_lid',String(lid));
    localStorage.setItem('sc1_rid',String(rid));
  }catch(e){}
}
function load(){
  try{
    var d=localStorage.getItem('sc1');
    if(d){
      var raw=JSON.parse(d);
      logs=raw.map(function(l){
        return{id:l.id,name:l.name,cfg:l.cfg||{laps:1,multiple:1,notes:1,beep:1},
          runners:l.runners.map(function(r){
            return{id:r.id,name:r.name,note:r.note||'',saved:r.saved||[],
              on:false,el:0,t0:0,le:0,lt:0,laps:[]};
          })};
      });
      lid=parseInt(localStorage.getItem('sc1_lid')||'10');
      rid=parseInt(localStorage.getItem('sc1_rid')||'10');
    }
  }catch(e){}
  if(!logs.length){
    logs=[
      {id:lid++,name:'Workout 1',cfg:{laps:1,multiple:1,notes:1,beep:1},runners:[]},
      {id:lid++,name:'Workout 2',cfg:{laps:1,multiple:1,notes:1,beep:1},runners:[]},
      {id:lid++,name:'Workout 3',cfg:{laps:1,multiple:1,notes:1,beep:1},runners:[]}
    ];
    save();
  }
}

function fmt(ms){
  if(ms<0)ms=0;
  var m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),t=Math.floor((ms%1000)/100);
  return(m<10?'0':'')+m+':'+(s<10?'0':'')+s+'.'+t;
}
function tstr(ts){
  if(!ts)return'-';
  var d=new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' at '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
}
function now(){return Date.now();}
function beep(){
  try{
    var c=new(window.AudioContext||window.webkitAudioContext)();
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=1047;
    g.gain.setValueAtTime(0.5,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);
    o.start();o.stop(c.currentTime+0.15);
  }catch(e){}
}

/* el = total frozen elapsed (never resets unless masterReset)
   t0 = timestamp when last started
   le = current lap elapsed (resets on each lap tap)
   lt = timestamp when current lap started */
function ge(r){return r.on ? r.el+(now()-r.t0) : r.el;}
function gle(r){return r.on ? r.le+(now()-r.lt) : r.le;}
function ex(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function find(id){for(var i=0;i<CL.runners.length;i++)if(CL.runners[i].id===id)return CL.runners[i];return null;}

function go(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  if(id==='s-logs')rl();
  else if(id==='s-log')rr();
  else if(id==='s-sort')rSort();
  else if(id==='s-set')oSet();
}
function sm(id){document.getElementById(id).classList.remove('h');}
function hm(id){document.getElementById(id).classList.add('h');}

function rl(){
  var el=document.getElementById('ll');
  if(!logs.length){el.innerHTML='<div style="padding:20px;color:#8e8e93;text-align:center;font-size:16px">Tap Add to create a group</div>';return;}
  el.innerHTML=logs.map(function(l){
    var c=l.runners.filter(function(r){return r.saved.length>0;}).length;
    return'<div class="lrow" onclick="oLog('+l.id+')">'+
      '<span class="ltxt">'+ex(l.name)+'</span>'+
      '<div style="display:flex;align-items:center;gap:8px">'+(c?'<span class="badge">'+c+'</span>':'')+
      '<span style="color:#bbb;font-size:16px">&rsaquo;</span></div></div>';
  }).join('');
}
function oLog(id){
  for(var i=0;i<logs.length;i++){if(logs[i].id===id){CL=logs[i];break;}}
  document.getElementById('ltit').textContent=CL.name;
  go('s-log');
}
function createLog(){
  var name=document.getElementById('mln').value.trim()||'New Log';
  logs.unshift({id:lid++,name:name,cfg:{laps:1,multiple:1,notes:1,beep:1},runners:[]});
  hm('ml');document.getElementById('mln').value='';save();rl();
}
function delLog(){
  if(!logs.length)return;
  if(confirm('Delete "'+logs[logs.length-1].name+'"?')){logs.pop();save();rl();}
}
function shareAll(){
  var t='SMARTCoach - All Groups\n'+new Date().toLocaleDateString()+'\n\n';
  logs.forEach(function(l){
    t+=l.name+'\n';
    l.runners.forEach(function(r){
      if(r.saved.length){t+='  '+r.name+':\n';r.saved.forEach(function(s,i){t+='    Run '+(i+1)+': '+fmt(s.ms)+'\n';});}
    });
    t+='\n';
  });
  oShare(t);
}

function mkR(){
  return{id:rid++,name:'Runner '+((CL?CL.runners.length:0)+1),note:'',
    on:false,el:0,t0:0,le:0,lt:0,laps:[],saved:[],ts:null};
}
function addR(){if(CL){CL.runners.push(mkR());save();rr();}}
function delR(){
  if(!CL||!CL.runners.length)return;
  if(confirm('Remove last runner?')){CL.runners.pop();save();rr();}
}
function rr(){
  if(!CL)return;
  var el=document.getElementById('rs');
  if(!CL.runners.length){
    el.innerHTML='<div style="padding:20px;text-align:center;color:#8e8e93;font-size:16px">Tap + to add runners</div>';
  }else{
    el.innerHTML=CL.runners.map(function(r){return rHTML(r);}).join('');
  }
  updMB();
}
function rHTML(r){
  var lapsHtml='';
  if(CL.cfg.laps&&r.laps.length){
    var lines=[],chunk=[];
    r.laps.forEach(function(x){
      chunk.push(fmt(x));
      if(chunk.length===5){lines.push(chunk.join(' / '));chunk=[];}
    });
    if(chunk.length)lines.push(chunk.join(' / '));
    lapsHtml='<div class="rlaps" id="rl-'+r.id+'"><span class="rlapslbl">Laps: </span>'+lines.join(' /<br>')+'</div>';
  }else{
    lapsHtml='<div class="rlaps" id="rl-'+r.id+'"></div>';
  }
  return'<div class="rdelbtn" id="db-'+r.id+'" onclick="deleteRunner('+r.id+')">Delete</div>'+
  '<div class="runner-row" id="rr-'+r.id+'" ontouchstart="_ss(event,'+r.id+')" ontouchmove="_sm(event,'+r.id+')" ontouchend="_se(event,'+r.id+')">'+
    '<div class="row-top">'+
      '<input class="rname" id="rn-'+r.id+'" type="text" value="'+ex(r.name)+'" placeholder="Name" '+
        'autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" '+
        'oninput="uN('+r.id+',this.value)" onblur="save()"/>'+
      '<div class="row-btns" style="gap:6px">'+
        '<button class="lapbtn'+(r.on&&CL.cfg.laps?' vis':'')+'" id="lapb-'+r.id+'" onclick="doLap('+r.id+')">Lap</button>'+
        '<button class="sbtn'+(r.on?' on':'')+'" id="sb-'+r.id+'" onclick="togR('+r.id+')">'+(r.on?'Stop':'Start')+'</button>'+
      '</div>'+
      '<div class="ibtn" onclick="oEnt('+r.id+')">i</div>'+
    '</div>'+
    '<div class="row-bot">'+
      '<div class="rtotal" id="rv-'+r.id+'">'+fmt(ge(r))+'</div>'+
      '<div class="rlaptime" id="rt-'+r.id+'">'+(r.on?fmt(gle(r)):'')+'</div>'+
    '</div>'+
    lapsHtml+
  '</div>';
}
function uN(id,v){var r=find(id);if(r)r.name=v;}
function uNote(id,v){var r=find(id);if(r)r.note=v;}
function updMB(){
  var any=CL&&CL.runners.some(function(r){return r.on;});
  var b=document.getElementById('mb');
  if(b){b.textContent=any?'Stop':'Start';b.style.background=any?'#555':'#2B4FCC';}
}

/* Stop a runner: freeze el at current total, freeze le, clear running state */
function stopRunner(r){
  if(!r.on)return;
  var n=now();
  r.el+=n-r.t0;   /* freeze total time */
  r.le+=n-r.lt;   /* freeze current lap time */
  r.on=false;
  r.saved.push({ms:r.el,ts:r.ts,laps:r.laps.slice(),note:r.note});
}

/* Individual start/stop toggle */
function togR(id){
  var r=find(id);if(!r)return;
  if(r.on){
    /* STOP: freeze time, save run */
    stopRunner(r);
    save();
    /* update display to show frozen time */
    var row=document.getElementById('rr-'+r.id);
    if(row){
      var vEl=row.querySelector('.rtotal');if(vEl)vEl.textContent=fmt(r.el);
      var ltEl=row.querySelector('.rlaptime');if(ltEl)ltEl.textContent='';
      var sb=row.querySelector('.sbtn');if(sb){sb.textContent='Start';sb.classList.remove('on');}
      var lb=row.querySelector('.lapbtn');if(lb)lb.classList.remove('vis');
    }
    updMB();
  }else{
    /* START: resume from current el, new lap from scratch */
    if(CL.cfg.beep)beep();
    if(!CL.cfg.multiple){
      CL.runners.forEach(function(x){if(x.id!==id&&x.on)stopRunner(x);});
    }
    var n=now();
    r.t0=n;          /* new start point - el stays frozen from before */
    r.lt=n;          /* new lap start */
    r.le=0;          /* reset current lap counter */
    r.on=true;
    if(!r.ts)r.ts=n; /* only set ts on very first start */
    /* update display */
    var row=document.getElementById('rr-'+r.id);
    if(row){
      var sb=row.querySelector('.sbtn');if(sb){sb.textContent='Stop';sb.classList.add('on');}
      if(CL.cfg.laps){var lb=row.querySelector('.lapbtn');if(lb)lb.classList.add('vis');}
    }
    updMB();
    tick();
  }
}

/* Lap: record split time, keep runner running, reset lap counter */
function doLap(id){
  var r=find(id);if(!r||!r.on)return;
  var n=now();
  var lapTime=r.le+(n-r.lt);  /* time for THIS lap only */
  r.laps.push(lapTime);
  r.le=0;r.lt=n;               /* reset lap timer, keep total running */
  /* update lap list display */
  var lapEl=document.getElementById('rl-'+r.id);
  if(lapEl&&CL.cfg.laps){
    var lines=[],chunk=[];
    r.laps.forEach(function(x){
      chunk.push(fmt(x));
      if(chunk.length===5){lines.push(chunk.join(' / '));chunk=[];}
    });
    if(chunk.length)lines.push(chunk.join(' / '));
    lapEl.innerHTML='<span class="rlapslbl">Laps: </span>'+lines.join(' /<br>');
  }
}

/* Master Start/Stop: controls ALL runners */
function masterToggle(){
  if(!CL)return;
  var any=CL.runners.some(function(r){return r.on;});
  if(any){
    /* STOP ALL */
    CL.runners.forEach(function(r){if(r.on)stopRunner(r);});
    save();
    rr(); /* re-render to show frozen times */
  }else{
    /* START ALL */
    if(CL.cfg.beep)beep();
    var n=now();
    CL.runners.forEach(function(r){
      r.t0=n;       /* resume from wherever el is frozen */
      r.lt=n;
      r.le=0;       /* reset lap counter on fresh start */
      r.on=true;
      if(!r.ts)r.ts=n;
    });
    rr();
    tick();
  }
}

/* Reset: ONLY this clears timers back to zero */
function masterReset(){
  if(!CL)return;
  if(!confirm('Reset all timers to 0?'))return;
  CL.runners.forEach(function(r){
    r.on=false;r.el=0;r.t0=0;r.le=0;r.lt=0;r.laps=[];r.ts=null;
  });
  rr();
}

/* Tick: update live displays every 100ms */
function tick(){
  if(tk)return;
  tk=setInterval(function(){
    if(!CL){clearInterval(tk);tk=null;return;}
    var anyOn=CL.runners.some(function(r){return r.on;});
    if(!anyOn){clearInterval(tk);tk=null;return;}
    CL.runners.filter(function(r){return r.on;}).forEach(function(r){
      var row=document.getElementById('rr-'+r.id);
      if(!row)return;
      var vEl=row.querySelector('.rtotal');
      if(vEl)vEl.textContent=fmt(ge(r));
      var ltEl=row.querySelector('.rlaptime');
      if(ltEl)ltEl.textContent=fmt(gle(r));
    });
  },100);
}

/* Info/Entry screen */
function oEnt(rid2){
  var r=find(rid2);CE=r;
  var last=r.saved.length?r.saved[r.saved.length-1]:null;
  document.getElementById('et').textContent=last?fmt(last.ms):'00:00.0';
  document.getElementById('ed').textContent=last?tstr(last.ts):'-';
  document.getElementById('en').textContent=r.name;
  var nr=document.getElementById('enote-row'),ne=document.getElementById('enotes');
  if(r.note){ne.textContent='Note: '+r.note;nr.style.display='flex';}else{nr.style.display='none';}
  var lp=document.getElementById('elaps'),laps=last?last.laps:[],h='';
  h+=laps.length?laps.map(function(x,i){
    return'<div class="laprow"><div style="flex:1"><div class="laptm">'+fmt(x)+'</div><div class="lapsub">Lap '+(i+1)+'</div></div><span style="color:#bbb">&rsaquo;</span></div>';
  }).join(''):'<div style="padding:14px 16px;color:#8e8e93;background:#fff;font-size:15px">No laps recorded</div>';
  lp.innerHTML=h;
  go('s-ent');
}
function clrLaps(){
  if(!CE)return;
  if(CE.saved.length)CE.saved[CE.saved.length-1].laps=[];
  CE.laps=[];save();oEnt(CE.id);
}

function oSet(){
  if(!CL)return;
  TC={laps:CL.cfg.laps,multiple:CL.cfg.multiple,notes:CL.cfg.notes,beep:CL.cfg.beep};
  document.getElementById('sn').value=CL.name;
  [{k:'laps',e:'tl'},{k:'multiple',e:'tm'},{k:'notes',e:'tn'},{k:'beep',e:'tb'}].forEach(function(x){
    document.getElementById(x.e).className='tog'+(TC[x.k]?' on':'');
  });
}
function tg(k){TC[k]=TC[k]?0:1;var map={laps:'tl',multiple:'tm',notes:'tn',beep:'tb'};document.getElementById(map[k]).className='tog'+(TC[k]?' on':'');}
function saveSets(){
  if(!CL)return;var n=document.getElementById('sn').value.trim();if(n)CL.name=n;
  CL.cfg={laps:TC.laps,multiple:TC.multiple,notes:TC.notes,beep:TC.beep};
  document.getElementById('ltit').textContent=CL.name;save();go('s-log');
}

function sortR(){
  if(!CL)return[];var rs=CL.runners.slice();
  function best(r){return r.saved.length?Math.min.apply(null,r.saved.map(function(s){return s.ms;})):Infinity;}
  function lat(r){return r.saved.length?Math.max.apply(null,r.saved.map(function(s){return s.ts;})):0;}
  if(SM==='longest')rs.sort(function(a,b){return best(b)-best(a);});
  else if(SM==='shortest')rs.sort(function(a,b){return best(a)-best(b);});
  else if(SM==='earliest')rs.sort(function(a,b){return lat(a)-lat(b);});
  else rs.sort(function(a,b){return lat(b)-lat(a);});return rs;
}
function rSort(){
  var rs=sortR(),el=document.getElementById('sl');
  el.innerHTML=rs.length?rs.map(function(r){var last=r.saved.length?r.saved[r.saved.length-1]:null;return'<div class="srow"><span class="stm">'+(last?fmt(last.ms):'00:00.0')+'</span><span class="sdt">'+(last?ex(r.name)+' - '+tstr(last.ts):ex(r.name))+'</span></div>';}).join(''):'<div style="padding:16px;color:#8e8e93">No times yet</div>';
  ['latest','earliest','longest','shortest'].forEach(function(k){document.getElementById('ss-'+k).className='sortbtn'+(SM===k?' on':'');});
}
function setSort(m){SM=m;rSort();}

function shareLog(){
  if(!CL)return;var t='SMARTCoach - '+CL.name+'\n'+new Date().toLocaleDateString()+'\n\n';
  CL.runners.forEach(function(r){t+=r.name+':\n';if(!r.saved.length){t+='  (no times)\n';return;}r.saved.forEach(function(s,i){t+='  Run '+(i+1)+': '+fmt(s.ms);if(s.laps&&s.laps.length)t+='  [Laps: '+s.laps.map(function(x){return fmt(x);}).join(' / ')+']';if(s.note)t+='  ('+s.note+')';t+='\n';});});oShare(t);
}
function sums(){
  if(!CL)return;var t='SMARTCoach - '+CL.name+' Summary\n'+new Date().toLocaleDateString()+'\n\n';
  CL.runners.forEach(function(r){var sum=r.saved.reduce(function(a,s){return a+s.ms;},0);var avg=r.saved.length?sum/r.saved.length:0;var best=r.saved.length?Math.min.apply(null,r.saved.map(function(s){return s.ms;})):0;t+=r.name+'\n  Runs: '+r.saved.length+'\n  Best: '+fmt(best)+'\n  Avg: '+fmt(avg)+'\n\n';});oShare(t);
}
function oShare(txt){document.getElementById('shtxt').textContent=txt;sm('msh');}
function copyShare(){
  var txt=document.getElementById('shtxt').textContent;
  if(navigator.share){navigator.share({title:'SMARTCoach Results',text:txt}).catch(function(){});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).catch(function(){});}
  else{var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  var b=event.target;b.textContent='Copied!';setTimeout(function(){b.textContent='Copy / Share';},1500);
}


var _info={
  laps:{t:'Laps',b:'Shows laps. Tap the Lap button during a run to record each lap split time. All lap times appear on the runner row separated by a slash.'},
  multiple:{t:'Multiple',b:'Allows multiple stopwatches to run at once. When off, starting one runner automatically stops any other runner that is currently running.'},
  notes:{t:'Notes on Detail Line',b:'Instead of showing the date and time in the stopwatch log, the notes are shown on the detail line of each entry.'},
  beep:{t:'Beep on Start',b:'Beeps when the start, stop, or lap button is tapped. Useful for eyes-free coaching on the track.'}
};
function showInfo(k){
  var d=_info[k];if(!d)return;
  document.getElementById('info-title').textContent=d.t;
  document.getElementById('info-body').textContent=d.b;
  sm('m-info');
}

var _sw={};
function _ss(e,id){var t=e.touches[0];_sw[id]={x:t.clientX,y:t.clientY};}
function _sm(e,id){
  var s=_sw[id];if(!s)return;
  var dx=e.touches[0].clientX-s.x,dy=Math.abs(e.touches[0].clientY-s.y);
  if(dy>15){delete _sw[id];return;}
  if(dx<-5){
    var cl=Math.max(-75,dx);
    var rw=document.getElementById('rr-'+id);
    var db=document.getElementById('db-'+id);
    if(rw)rw.style.transform='translateX('+cl+'px)';
    if(db)db.style.transform='translateX('+(75+cl)+'px)';
    e.preventDefault();
  }
}
function _se(e,id){
  var s=_sw[id];if(!s)return;
  var dx=e.changedTouches[0].clientX-s.x;
  var rw=document.getElementById('rr-'+id);
  var db=document.getElementById('db-'+id);
  if(dx<-40){
    if(rw)rw.style.transform='translateX(-75px)';
    if(db)db.style.transform='translateX(0)';
  }else{
    if(rw)rw.style.transform='';
    if(db)db.style.transform='';
  }
  delete _sw[id];
}
function _closeAll(){
  if(!CL)return;
  CL.runners.forEach(function(r){
    var rw=document.getElementById('rr-'+r.id);
    var db=document.getElementById('db-'+r.id);
    if(rw)rw.style.transform='';
    if(db)db.style.transform='';
  });
}
function deleteRunner(id){
  if(!CL)return;
  CL.runners=CL.runners.filter(function(r){return r.id!==id;});
  save();rr();
}
load();rl();
setTimeout(function(){var s=document.getElementById('splash');s.classList.add('gone');setTimeout(function(){s.style.display='none';},400);},1600);
document.addEventListener('touchstart',function(e){
  var t=e.target;
  if(t.tagName==='BUTTON'||t.classList.contains('blnk')||t.classList.contains('ibtn')||t.classList.contains('tog')){
    e.preventDefault();t.click();
  }
},{passive:false});
</script>
<div class="mover h" id="m-info"><div class="msh"><div class="mhd"></div><div class="mttl" id="info-title"></div><div style="padding:0 16px 16px;font-size:16px;color:#333;text-align:center;line-height:1.6" id="info-body"></div><button class="mbtn" onclick="hm('m-info')">Close</button><div style="height:8px"></div></div></div>
</body>
