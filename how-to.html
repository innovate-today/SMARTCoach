<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-store">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMART Trak How To Guide</title>
<style>
:root{--blue:#2B4FCC;--ink:#111827;--muted:#526481;--line:#dbe3ef;--bg:#eef3f9;--white:#fff}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.page{max-width:1180px;margin:0 auto;padding:20px 18px 34px}
body.embedded .page{max-width:none;padding:16px 18px 28px}
.top{position:sticky;top:10px;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:16px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px;box-shadow:0 12px 28px rgba(15,23,42,.08)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}.mark{width:58px;height:58px;display:grid;place-items:center;flex:0 0 58px}.mark img{display:block;max-width:58px;max-height:58px;object-fit:contain}
h1{font-size:24px;line-height:1.15;margin:0}.sub{font-size:14px;color:var(--muted);margin-top:4px;font-weight:500}.updated{display:inline-flex;margin-top:8px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#334155;font-size:13px;font-weight:800;padding:7px 10px}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.linkbtn,button{border:0;border-radius:8px;background:var(--blue);color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:8px 11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;min-height:34px;line-height:1.15}.secondary{background:#dde3ed;color:#172033}.utility{background:#f8fafc;color:#334155;border:1px solid var(--line)}
.layout{display:grid;grid-template-columns:minmax(220px,280px) minmax(0,1fr);gap:14px;align-items:start}.toc,.guide{background:#fff;border:1px solid var(--line);border-radius:8px}.toc{position:sticky;top:104px;padding:14px;max-height:calc(100vh - 125px);overflow:auto}.toc h2{font-size:15px;margin:0 0 10px}.toc a{display:block;color:#173891;text-decoration:none;font-size:13px;font-weight:800;line-height:1.25;padding:7px 8px;border-radius:7px}.toc a:hover{background:#eef4ff}.guide{padding:22px 26px;line-height:1.55}.guide h1{font-size:30px;margin:0 0 10px}.guide h2{font-size:22px;margin:28px 0 10px;padding-top:8px;border-top:1px solid var(--line)}.guide h3{font-size:18px;margin:22px 0 8px}.guide p{margin:0 0 12px}.guide ul,.guide ol{margin:0 0 14px 24px;padding:0}.guide li{margin:5px 0}.guide strong{font-weight:900}.guide code{background:#eef2f7;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.92em}.status{color:var(--muted);font-size:13px;font-weight:800;margin:0 0 12px}.empty{padding:22px;text-align:center;color:var(--muted);font-weight:800}
@media(max-width:860px){.top{align-items:flex-start;flex-direction:column}.actions{width:100%;justify-content:stretch}.actions a,.actions button{flex:1}.layout{grid-template-columns:1fr}.toc{position:static;max-height:none}.guide{padding:18px}}
</style>
</head>
<body>
<main class="page">
  <section class="top">
    <div class="brand">
      <div class="mark"><img data-brand-logo src="/assets/smart-logo.png" alt="SMART Trak"></div>
      <div>
        <h1>SMART Trak How To Guide</h1>
        <div class="sub">Coach-facing guide for SMART Trak and the SMARTCoach Pro mobile app.</div>
        <div id="lastUpdated" class="updated">Loading guide --</div>
      </div>
    </div>
    <div class="actions">
      <a id="dashboardLink" class="linkbtn" href="/dashboard.html">Dashboard</a>
      <button id="printBtn" class="utility" type="button">Print</button>
    </div>
  </section>
  <section class="layout">
    <nav class="toc" aria-label="Guide sections">
      <h2>Sections</h2>
      <div id="tocBody"><div class="empty">Loading sections...</div></div>
    </nav>
    <article class="guide">
      <div id="guideStatus" class="status">Loading the latest guide...</div>
      <div id="guideBody"></div>
    </article>
  </section>
</main>
<script>
function embeddedMode(){try{var p=new URLSearchParams(location.search||'');return p.get('embed')==='1'||p.get('iframe')==='1'||p.get('embedded')==='1';}catch(e){return false;}}
function accountKey(){try{return(new URLSearchParams(location.search||'').get('account')||localStorage.getItem('sc_account')||'default').trim()||'default';}catch(e){return 'default';}}
function pageUrl(path){var url=new URL(path,location.origin);var key=accountKey();if(key&&key!=='default')url.searchParams.set('account',key);if(embeddedMode())url.searchParams.set('embed','1');return url.pathname+url.search;}
function esc(value){return String(value||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function inlineMarkdown(text){return esc(text).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');}
function slug(text,index){return String(text||'section').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||('section-'+index);}
function renderMarkdown(markdown){
  var lines=String(markdown||'').replace(/\r\n/g,'\n').split('\n');
  var html=[],toc=[],list=null,paragraph=[];
  function flushParagraph(){if(paragraph.length){html.push('<p>'+inlineMarkdown(paragraph.join(' '))+'</p>');paragraph=[];}}
  function closeList(){if(list){html.push('</'+list+'>');list=null;}}
  lines.forEach(function(line){
    var heading=line.match(/^(#{1,3})\s+(.+)$/);
    var ordered=line.match(/^\d+\.\s+(.+)$/);
    var bullet=line.match(/^[-*]\s+(.+)$/);
    if(heading){
      flushParagraph();closeList();
      var level=heading[1].length;
      var text=heading[2].trim();
      var id=slug(text,toc.length);
      if(level<=2)toc.push({id:id,text:text,level:level});
      html.push('<h'+level+' id="'+esc(id)+'">'+inlineMarkdown(text)+'</h'+level+'>');
      return;
    }
    if(ordered||bullet){
      flushParagraph();
      var type=ordered?'ol':'ul';
      if(list&&list!==type)closeList();
      if(!list){list=type;html.push('<'+type+'>');}
      html.push('<li>'+inlineMarkdown((ordered||bullet)[1].trim())+'</li>');
      return;
    }
    if(!line.trim()){flushParagraph();closeList();return;}
    paragraph.push(line.trim());
  });
  flushParagraph();closeList();
  document.getElementById('guideBody').innerHTML=html.join('\n')||'<div class="empty">No guide content found.</div>';
  document.getElementById('tocBody').innerHTML=toc.length?toc.map(function(item){return '<a href="#'+esc(item.id)+'">'+esc(item.text)+'</a>';}).join(''):'<div class="empty">No sections found.</div>';
}
function init(){
  document.body.classList.toggle('embedded',embeddedMode());
  document.getElementById('dashboardLink').href=pageUrl('/dashboard.html');
  document.getElementById('printBtn').addEventListener('click',function(){window.print();});
  fetch('/SMART_TRAK_COACH_HOW_TO.md?t='+Date.now(),{cache:'no-store'}).then(function(res){if(!res.ok)throw new Error('Guide could not be loaded.');return res.text();}).then(function(text){
    renderMarkdown(text);
    document.getElementById('guideStatus').textContent='Showing the latest saved how-to guide.';
    document.getElementById('lastUpdated').textContent='Last loaded '+new Date().toLocaleString();
  }).catch(function(error){
    document.getElementById('guideStatus').textContent=error.message||'Guide could not be loaded.';
    document.getElementById('guideBody').innerHTML='<div class="empty">Try refreshing this page, or return to the Dashboard.</div>';
    document.getElementById('tocBody').innerHTML='<div class="empty">Guide unavailable.</div>';
    document.getElementById('lastUpdated').textContent='Guide unavailable';
  });
}
document.addEventListener('DOMContentLoaded',init);
</script>
<script src="/assets/smartcoach-help-widget.js"></script>
</body>
</html>
