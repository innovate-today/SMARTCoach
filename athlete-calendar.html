<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-store">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMARTCoach Pro Athlete Calendar</title>
<style>
:root{--blue:#2b4fcc;--ink:#111827;--muted:#52627a;--line:#d6dfec;--bg:#eef3f9;--panel:#fff;--good:#08783c;--warn:#b45309;--bad:#b91c1c}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.page{max-width:1180px;margin:0 auto;padding:18px 18px 34px}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px;box-shadow:0 10px 24px rgba(15,23,42,.08)}
.brand{display:flex;align-items:center;gap:12px}.brand img{width:58px;height:58px;object-fit:contain}h1{font-size:25px;line-height:1.08;margin:0}.sub{font-size:14px;color:var(--muted);margin-top:4px}.updated{display:inline-flex;margin-top:8px;border:1px solid var(--line);border-radius:8px;background:#f8fbff;padding:6px 10px;font-size:13px;font-weight:800;color:#334155}
button{border:0;border-radius:8px;background:var(--blue);color:#fff;font:800 14px inherit;padding:9px 12px;cursor:pointer}button.secondary{background:#dde3ed;color:#172033}button.good{background:#dcfce7;color:#08783c}button.warn{background:#ffedd5;color:#9a3412}button.bad{background:#fee2e2;color:#991b1b}button:disabled{opacity:.55;cursor:not-allowed}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:14px;overflow:hidden}.panelhead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line)}.panelhead h2{font-size:18px;margin:0}.panelbody{padding:14px 15px}.status{font-size:13px;font-weight:900;color:var(--muted)}
.login{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end}label{display:grid;gap:5px;font-size:12px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:.03em}input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;color:#111827;font:14px inherit;padding:10px 12px}textarea{min-height:72px;resize:vertical}
.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.day{border:1px solid var(--line);border-radius:8px;background:#fbfdff;padding:13px;display:grid;gap:10px}.day.submitted-completed{border-color:#86efac;background:#f0fdf4}.day.submitted-modified{border-color:#fed7aa;background:#fff7ed}.day.submitted-skipped{border-color:#fecaca;background:#fff1f2}.daytop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.date{font-size:13px;color:#475569;font-weight:900;text-transform:uppercase}.title{font-size:18px;font-weight:950;color:#0f2a70}.meta{color:#52627a;font-size:13px;line-height:1.35}.details{white-space:pre-wrap;font-size:14px;line-height:1.45}.pill{display:inline-flex;border-radius:999px;padding:4px 8px;background:#e8eefc;color:#173891;font-size:12px;font-weight:900}.submitted{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px 10px;font-size:13px;font-weight:900;color:#334155}.submitted.good{border-color:#bbf7d0;color:#08783c}.submitted.warn{border-color:#fed7aa;color:#9a3412}.submitted.bad{border-color:#fecaca;color:#991b1b}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button.selected{box-shadow:0 0 0 2px #111827 inset}
.empty{padding:24px;text-align:center;color:var(--muted)}.modal{position:fixed;inset:0;background:rgba(15,23,42,.42);display:flex;align-items:flex-start;justify-content:center;padding:12px;z-index:30;overflow:auto}.modal[hidden]{display:none}.modalpanel{width:min(620px,100%);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 18px 44px rgba(15,23,42,.22);overflow:hidden}.modalhead{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line)}.modalhead h2{font-size:20px;margin:0}.modalbody{padding:14px 15px}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field.full{grid-column:1/-1}.modalactions{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:12px}.modalstatus{margin-right:auto;font-size:13px;font-weight:800;color:var(--muted)}
@media(max-width:760px){.page{padding:12px 10px 28px}.top{align-items:flex-start;flex-direction:column}.login,.cards,.formgrid{grid-template-columns:1fr}.actions button{flex:1}.modalactions{align-items:stretch;flex-direction:column}.modalstatus{margin-right:0}}
</style>
</head>
<body>
<main class="page">
  <section class="top">
    <div class="brand">
      <img src="/assets/smart-logo.png" alt="SMARTCoach Pro">
      <div>
        <h1>SMARTCoach Pro Athlete Calendar</h1>
        <div id="subtitle" class="sub">View assigned workouts and submit completed, modified, or skipped work.</div>
        <div id="lastUpdated" class="updated">Access required</div>
      </div>
    </div>
    <button id="refreshBtn" class="secondary" type="button">Refresh</button>
  </section>

  <section id="loginPanel" class="panel">
    <div class="panelhead"><h2>Athlete Access</h2><span class="status">Use the link or code from your coach.</span></div>
    <div class="panelbody login">
      <label>Athlete ID
        <input id="athleteId" type="text" autocomplete="off" autocorrect="off" spellcheck="false">
      </label>
      <label>Access Code
        <input id="accessCode" type="password" autocomplete="off">
      </label>
      <button id="loadBtn" type="button">Open Calendar</button>
    </div>
  </section>

  <section class="panel">
    <div class="panelhead"><h2>Assigned Workouts</h2><span id="status" class="status">Loading...</span></div>
    <div class="panelbody">
      <div id="calendarBody" class="cards"><div class="empty">Enter athlete access to view workouts.</div></div>
    </div>
  </section>
</main>

<section id="submitModal" class="modal" hidden>
  <div class="modalpanel">
    <div class="modalhead">
      <h2 id="modalTitle">Workout Update</h2>
      <button id="closeModalBtn" class="secondary" type="button">Close</button>
    </div>
    <div class="modalbody">
      <div id="modalSummary" class="meta"></div>
      <div class="formgrid">
        <div class="field"><label>Actual Distance / Volume<input id="actualVolume" type="text" placeholder="Example: 3 miles"></label></div>
        <div class="field"><label>Total Time<input id="totalTime" type="text" placeholder="Optional, e.g. 24:30"></label></div>
        <div class="field full"><label>Notes<textarea id="notes" placeholder="Required for skipped workouts. Optional for modified workouts."></textarea></label></div>
      </div>
      <div class="modalactions">
        <div id="modalStatus" class="modalstatus"></div>
        <button id="saveUpdateBtn" type="button">Save Update</button>
      </div>
    </div>
  </div>
</section>

<script>
var days=[],athlete=null,currentDay=null,currentAction='completed';
var els={
  subtitle:document.getElementById('subtitle'),lastUpdated:document.getElementById('lastUpdated'),status:document.getElementById('status'),calendarBody:document.getElementById('calendarBody'),loginPanel:document.getElementById('loginPanel'),athleteId:document.getElementById('athleteId'),accessCode:document.getElementById('accessCode'),loadBtn:document.getElementById('loadBtn'),refreshBtn:document.getElementById('refreshBtn'),modal:document.getElementById('submitModal'),modalTitle:document.getElementById('modalTitle'),modalSummary:document.getElementById('modalSummary'),actualVolume:document.getElementById('actualVolume'),totalTime:document.getElementById('totalTime'),notes:document.getElementById('notes'),modalStatus:document.getElementById('modalStatus'),saveUpdateBtn:document.getElementById('saveUpdateBtn')
};
function accountKey(){try{var p=new URLSearchParams(location.search||'');return (p.get('account')||localStorage.getItem('sc_account')||'default').trim()||'default';}catch(e){return 'default';}}
function apiUrl(path){return path+(path.indexOf('?')>=0?'&':'?')+'account='+encodeURIComponent(accountKey())+'&t='+Date.now();}
function esc(value){return String(value||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function params(){return new URLSearchParams(location.search||'');}
function init(){var p=params();els.athleteId.value=p.get('athlete')||p.get('athleteId')||'';els.accessCode.value=p.get('code')||'';els.loadBtn.addEventListener('click',loadCalendar);els.refreshBtn.addEventListener('click',loadCalendar);document.getElementById('closeModalBtn').addEventListener('click',closeModal);els.saveUpdateBtn.addEventListener('click',saveUpdate);els.calendarBody.addEventListener('click',function(event){var btn=event.target.closest&&event.target.closest('[data-action]');if(btn)openSubmit(btn.getAttribute('data-id'),btn.getAttribute('data-action'));});if(els.athleteId.value&&els.accessCode.value)loadCalendar();else{els.status.textContent='Access required.';els.lastUpdated.textContent='Access required';}}
function loadCalendar(){var id=els.athleteId.value.trim(),code=els.accessCode.value.trim();if(!id||!code){els.status.textContent='Enter athlete ID and access code.';return;}els.status.textContent='Loading calendar...';fetch(apiUrl('/api/smart-trak/athlete-calendar')+'&athlete='+encodeURIComponent(id)+'&code='+encodeURIComponent(code),{cache:'no-store'}).then(jsonResult).then(function(data){athlete=data.athlete||null;days=data.days||[];els.loginPanel.hidden=true;els.subtitle.textContent=athlete&&athlete.name?'Assigned workouts for '+athlete.name:'Assigned workouts';els.lastUpdated.textContent='Last updated '+new Date().toLocaleString();render();}).catch(function(error){els.status.textContent=error.message;els.lastUpdated.textContent='Could not load';els.loginPanel.hidden=false;});}
function render(){els.status.textContent=days.length+' workout'+(days.length===1?'':'s')+' available';if(!days.length){els.calendarBody.innerHTML='<div class="empty">No assigned workouts are available right now.</div>';return;}els.calendarBody.innerHTML=days.map(dayHtml).join('');}
function dayHtml(day){var submitted=submittedState(day);return '<article class="day '+(submitted?'submitted-'+submitted.key:'')+'"><div class="daytop"><div><div class="date">'+esc(formatDate(day.date))+'</div><div class="title">'+esc(day.title||'Workout')+'</div></div><span class="pill">'+esc(day.status||'Scheduled')+'</span></div><div class="meta">'+esc([day.groupName,day.workoutType,day.plannedVolume].filter(Boolean).join(' · '))+'</div><div class="details">'+esc(day.details||day.targetSplits||'No workout details entered.')+'</div>'+(day.targetSplits?'<div class="meta"><b>Target:</b> '+esc(day.targetSplits)+'</div>':'')+(submitted?'<div class="submitted '+submitted.className+'">Submitted: '+esc(submitted.label)+'</div>':'')+'<div class="actions"><button class="good '+(submitted&&submitted.key==='completed'?'selected':'')+'" type="button" data-action="completed" data-id="'+esc(day.id)+'">Complete</button><button class="warn '+(submitted&&submitted.key==='modified'?'selected':'')+'" type="button" data-action="modified" data-id="'+esc(day.id)+'">Modify</button><button class="bad '+(submitted&&submitted.key==='skipped'?'selected':'')+'" type="button" data-action="skipped" data-id="'+esc(day.id)+'">Skip</button></div></article>';}
function submittedState(day){var status=String(day&&day.status||'').toLowerCase();if(status.indexOf('skipped')>=0)return{key:'skipped',label:'Skipped',className:'bad'};if(status.indexOf('modified')>=0||status.indexOf('correction')>=0)return{key:'modified',label:'Modified',className:'warn'};if(status.indexOf('completed')>=0)return{key:'completed',label:'Complete',className:'good'};return null;}
function openSubmit(id,action){currentDay=days.find(function(day){return day.id===id;})||null;currentAction=action||'completed';if(!currentDay)return;els.modalTitle.textContent=currentAction==='skipped'?'Skip Workout':currentAction==='modified'?'Modify Workout':'Complete Workout';els.modalSummary.textContent=[formatDate(currentDay.date),currentDay.title,currentDay.plannedVolume].filter(Boolean).join(' · ');els.actualVolume.value=currentAction==='completed'?(currentDay.plannedVolume||''):'';els.totalTime.value='';els.notes.value='';els.modalStatus.textContent=currentAction==='skipped'?'Notes are required for skipped workouts.':'';els.modal.hidden=false;}
function closeModal(){els.modal.hidden=true;currentDay=null;}
function saveUpdate(){if(!currentDay)return;var payload={athleteId:els.athleteId.value.trim(),code:els.accessCode.value.trim(),dayId:currentDay.id,action:currentAction,actualVolume:els.actualVolume.value.trim(),totalTime:els.totalTime.value.trim(),notes:els.notes.value.trim()};if(currentAction==='skipped'&&!payload.notes){els.modalStatus.textContent='Add a note before skipping this workout.';return;}els.saveUpdateBtn.disabled=true;els.modalStatus.textContent='Saving update...';fetch(apiUrl('/api/smart-trak/athlete-calendar'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(jsonResult).then(function(){els.modalStatus.textContent='Saved to SMART Trak.';setTimeout(function(){closeModal();loadCalendar();},500);}).catch(function(error){els.modalStatus.textContent=error.message;}).finally(function(){els.saveUpdateBtn.disabled=false;});}
function jsonResult(res){return res.json().catch(function(){return{};}).then(function(data){if(!res.ok)throw new Error(data.error||'Request failed.');return data;});}
function formatDate(value){var d=new Date(String(value||'')+'T12:00:00');if(Number.isNaN(d.getTime()))return value||'';return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'});}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
